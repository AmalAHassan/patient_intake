version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: intake_user
      POSTGRES_PASSWORD: intake_password
      POSTGRES_DB: intake_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intake_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  hapi:
    image: hapiproject/hapi:latest
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.server_address: http://hapi:8080/fhir
      hapi.fhir.subscription.websocket_enabled: "true"
      hapi.fhir.cors.allowed_origin: "*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: intake_network
